<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Игра с чатом Ютуба</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; font-family: sans-serif; overflow: hidden; }
        .container { display: flex; width: 100%; height: 100%; }
        
        /* Зона для твоей игры */
        .game-area { 
            flex-grow: 1; 
            background-color: #1a1a1a; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: white; 
            font-size: 24px;
        }
        
        /* Боковая панель чата в стиле Twitch */
        .chat-sidebar { 
            width: 340px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            background-color: #18181b; 
            border-left: 1px solid #2f2f35; 
            position: relative;
        }

        /* Наша кастомная шапка */
        .chat-header { 
            padding: 15px; 
            color: #efeff1; 
            font-weight: bold; 
            text-align: center; 
            border-bottom: 1px solid #2f2f35; 
            font-size: 14px; 
            background-color: #18181b;
            z-index: 10; /* Чтобы перекрывать скрытую шапку ютуба */
        }

        /* Контейнер-маска, который прячет лишние элементы YouTube */
        .chat-wrapper {
            width: 100%;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }
        
        /* Сам iframe сдвигаем вверх на 50 пикселей, чтобы скрыть стандартную шапку YouTube */
        .youtube-chat-frame { 
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%; 
            height: calc(100% + 50px); 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Слева твоя игра -->
        <main class="game-area">
            <div>Твоя игра будет здесь</div>
        </main>

        <!-- Справа кастомный чат -->
        <aside class="chat-sidebar">
            <div class="chat-header">ЧАТ ТРАНСЛЯЦИИ</div>
            
            <div class="chat-wrapper">
                <!-- Встроенная защита sandbox блокирует переходы на ютуб при нажатиях -->
                <iframe 
                    src="https://www.youtube.com/live_chat?v=Gk2Ol5IY6mc&embed_domain=gora22231g.github.io" 
                    class="youtube-chat-frame"
                    sandbox="allow-scripts allow-same-origin allow-forms">
                </iframe>
            </div>
        </aside>
    </div>

</body>
</html>
